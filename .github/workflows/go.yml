name: Build/Unit tests/Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install goveralls
      run: go install github.com/mattn/goveralls@latest

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.1'

    - name: Build
      run: go build -v ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.12.2
        args: --verbose --timeout 10m --fix=false --config=.golangci.yml ./pkg/...

    - name: Generate coverage report for coveralls.io
      run: |
        go test -coverprofile=/var/tmp/capillaries.p.tmp -cover $(find ./ -name '*_test.go' ! -wholename './pkg/api*' ! -wholename './pkg/gocql*' -printf "%h\n" | sort -u)
        cat /var/tmp/capillaries.p.tmp | grep -v "donotcover" > /var/tmp/capillaries.p

    - name: Send coverage to coveralls.io
      env:
        COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: goveralls -coverprofile=/var/tmp/capillaries.p -service=github
  
    - name: gocqlmem test coverage threshold check
      env:
          TESTCOVERAGE_THRESHOLD: 77.3
      run: |
            go test -v ./*.go -coverprofile coverage.out -covermode count
            totalCoverage=`go tool cover -func=coverage.out | grep total | grep -Eo '[0-9]+\.[0-9]+'`
            if (( $(echo "$totalCoverage $TESTCOVERAGE_THRESHOLD" | awk '{print ($1 >= $2)}') )); then
                echo -e "\033[32mOK: $totalCoverage >= $TESTCOVERAGE_THRESHOLD\033[0m"
            else
                echo -e "\033[31mFAILED: $totalCoverage < $TESTCOVERAGE_THRESHOLD. Cover more with unit tests or adjust threshold to a lower value.\033[0m"
                exit 1
            fi

    - name: gocqlmem/eval test coverage threshold check
      env:
          TESTCOVERAGE_THRESHOLD: 96.9
      run: |
            go test -v ./eval/... -coverprofile coverage.out -covermode count
            totalCoverage=`go tool cover -func=coverage.out | grep total | grep -Eo '[0-9]+\.[0-9]+'`
            if (( $(echo "$totalCoverage $TESTCOVERAGE_THRESHOLD" | awk '{print ($1 >= $2)}') )); then
                echo -e "\033[32mOK: $totalCoverage >= $TESTCOVERAGE_THRESHOLD\033[0m"
            else
                echo -e "\033[31mFAILED: $totalCoverage < $TESTCOVERAGE_THRESHOLD. Cover more with unit tests or adjust threshold to a lower value.\033[0m"
                exit 1
            fi
